<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>静态影视库｜搜索</title>
  <meta name="description" content="基于上传素材重建的纯静态电影网站，包含 2000 部影片、详情页、分类页、排行榜与搜索功能。">
  <meta name="keywords" content="搜索电影, 搜索剧集, 搜索动画, 影视筛选">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <link rel="stylesheet" href="assets/style.css">
  <script defer src="assets/app.js"></script>
</head>
<body>
<a class="skip-link" href="#main">跳到正文</a>
<header class="header">
  <div class="container header-inner">
    <a class="brand" href="index.html">
      <span class="brand-mark">影</span>
      <span>
        <span class="brand-title">静态影视库</span><br>
        <span class="brand-sub">2000 部静态影片 · 详情页 · 分类 · 搜索</span>
      </span>
    </a>
    <button class="btn menu-toggle" data-menu-toggle type="button">菜单</button>
    <nav class="nav" data-nav>
      <a href="index.html">首页</a><a href="page/page-1.html">全站影片</a><a href="search.html">搜索</a><a href="ranking.html">排行榜</a><a href="category/电影.html">电影</a><a href="category/剧集.html">剧集</a><a href="category/动画.html">动画</a><a href="category/纪录片.html">纪录片</a><a href="category/综艺.html">综艺</a><a href="category/其他.html">其他</a>
    </nav>
  </div>
</header>
<main id="main" class="search-page">
  <div class="container" data-search-root data-json-url="assets/movies.json">
    <div class="detail-block">
      <h1 style="margin-top:0;">全站搜索</h1>
      <p class="small">输入片名、类型、年份、地区、标签或剧情关键词，支持 2000 部影片的本地静态检索。</p>
      <div class="list-toolbar">
        <div class="filters">
          <input class="input" data-search-input type="search" placeholder="搜索片名 / 剧情 / 标签">
          <select class="select" data-type-select>
            <option value="">全部类型</option>
            <option value="电影">电影</option>
            <option value="剧集">剧集</option>
            <option value="动画">动画</option>
            <option value="纪录片">纪录片</option>
            <option value="综艺">综艺</option>
            <option value="其他">其他</option>
          </select>
          <select class="select" data-year-select>
            <option value="">全部年份</option>
          </select>
        </div>
        <div class="badge">匹配 <strong data-search-count>0</strong> 部</div>
      </div>
      <div class="search-meta">结果会即时更新，并最多显示前 200 条。</div>
      <div class="notice" data-search-empty hidden>没有找到匹配结果，请尝试更换关键词。</div>
    </div>
    <div class="search-results" data-search-results></div>
  </div>
</main>
<footer class="footer">
  <div class="container footer-inner">
    <div>
      <strong>静态影视库</strong>
      <div class="small">基于上传素材重建，支持离线静态浏览。</div>
    </div>
    <div class="small">共收录 2000 部影片</div>
  </div>
</footer>

</html>
